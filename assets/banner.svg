<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 400" width="1500" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d0020;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#060015;stop-opacity:1"/>
    </linearGradient>
    <!-- Purple glow for text -->
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="400" fill="url(#bgGrad)"/>

  <!-- Circuit board lines - horizontal -->
  <g stroke="#2d0060" stroke-width="0.8" opacity="0.6">
    <line x1="0" y1="50" x2="1500" y2="50"/>
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="700" y1="150" x2="1500" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="600" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="300" x2="700" y2="300"/>
    <line x1="900" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="350" x2="1500" y2="350"/>
  </g>

  <!-- Circuit board lines - vertical -->
  <g stroke="#2d0060" stroke-width="0.8" opacity="0.6">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="150" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="1300" y1="0" x2="1300" y2="400"/>
    <line x1="1400" y1="0" x2="1400" y2="400"/>
  </g>

  <!-- Network nodes - glowing dots -->
  <g filter="url(#glow)">
    <circle cx="100" cy="50" r="4" fill="#7B2FBE" opacity="0.9"/>
    <circle cx="200" cy="100" r="3" fill="#9D4EDD" opacity="0.8"/>
    <circle cx="500" cy="50" r="5" fill="#7B2FBE" opacity="0.9"/>
    <circle cx="600" cy="150" r="3" fill="#9D4EDD" opacity="0.7"/>
    <circle cx="700" cy="200" r="4" fill="#7B2FBE" opacity="0.8"/>
    <circle cx="900" cy="100" r="3" fill="#9D4EDD" opacity="0.9"/>
    <circle cx="1000" cy="250" r="5" fill="#7B2FBE" opacity="0.8"/>
    <circle cx="1100" cy="150" r="3" fill="#9D4EDD" opacity="0.7"/>
    <circle cx="1200" cy="300" r="4" fill="#7B2FBE" opacity="0.9"/>
    <circle cx="1300" cy="200" r="3" fill="#9D4EDD" opacity="0.8"/>
    <circle cx="1400" cy="350" r="5" fill="#7B2FBE" opacity="0.7"/>
    <circle cx="400" cy="200" r="4" fill="#9D4EDD" opacity="0.9"/>
    <circle cx="300" cy="300" r="3" fill="#7B2FBE" opacity="0.8"/>
    <circle cx="100" cy="350" r="5" fill="#9D4EDD" opacity="0.7"/>
    <circle cx="1400" cy="100" r="4" fill="#7B2FBE" opacity="0.9"/>
    <circle cx="1100" cy="350" r="3" fill="#9D4EDD" opacity="0.8"/>
    <circle cx="800" cy="50" r="4" fill="#7B2FBE" opacity="0.7"/>
    <circle cx="800" cy="300" r="5" fill="#9D4EDD" opacity="0.9"/>
    <circle cx="200" cy="250" r="3" fill="#7B2FBE" opacity="0.8"/>
    <circle cx="600" cy="350" r="4" fill="#9D4EDD" opacity="0.7"/>
  </g>

  <!-- Hexagonal pattern overlay - right side subtle -->
  <g stroke="#3a0080" stroke-width="0.5" fill="none" opacity="0.3">
    <!-- Hex group top right area -->
    <polygon points="1350,20 1380,36 1380,68 1350,84 1320,68 1320,36"/>
    <polygon points="1410,20 1440,36 1440,68 1410,84 1380,68 1380,36"/>
    <polygon points="1350,84 1380,100 1380,132 1350,148 1320,132 1320,100"/>
    <polygon points="1410,84 1440,100 1440,132 1410,148 1380,132 1380,100"/>
    <polygon points="1350,148 1380,164 1380,196 1350,212 1320,196 1320,164"/>
    <polygon points="1470,20 1500,36 1500,68 1470,84 1440,68 1440,36"/>
    <polygon points="1470,84 1500,100 1500,132 1470,148 1440,132 1440,100"/>
  </g>

  <!-- Diagonal accent lines -->
  <g stroke="#6600cc" stroke-width="1" opacity="0.4">
    <line x1="0" y1="0" x2="150" y2="400"/>
    <line x1="30" y1="0" x2="180" y2="400"/>
    <line x1="1350" y1="0" x2="1500" y2="150"/>
    <line x1="1320" y1="0" x2="1500" y2="220"/>
  </g>

  <!-- Left glow accent bar -->
  <rect x="0" y="0" width="4" height="400" fill="#9D4EDD" opacity="0.8" filter="url(#glow)"/>
  <!-- Top glow accent bar -->
  <rect x="0" y="0" width="1500" height="2" fill="#9D4EDD" opacity="0.6" filter="url(#glow)"/>
  <!-- Bottom glow accent bar -->
  <rect x="0" y="398" width="1500" height="2" fill="#9D4EDD" opacity="0.6" filter="url(#glow)"/>

  <!-- Shield icon (right side) -->
  <g transform="translate(1130, 80)" filter="url(#strongGlow)">
    <!-- Shield outline -->
    <path d="M120,0 L240,50 L240,160 Q240,240 120,280 Q0,240 0,160 L0,50 Z" 
          fill="none" stroke="#9D4EDD" stroke-width="3" opacity="0.7"/>
    <!-- Shield inner lines -->
    <path d="M120,30 L210,70 L210,160 Q210,220 120,250 Q30,220 30,160 L30,70 Z" 
          fill="none" stroke="#7B2FBE" stroke-width="1.5" opacity="0.5"/>
    <!-- Lock body -->
    <rect x="85" y="130" width="70" height="60" rx="8" fill="none" stroke="#9D4EDD" stroke-width="2.5" opacity="0.8"/>
    <!-- Lock shackle -->
    <path d="M95,130 L95,110 Q95,80 120,80 Q145,80 145,110 L145,130" 
          fill="none" stroke="#9D4EDD" stroke-width="2.5" opacity="0.8"/>
    <!-- Lock keyhole -->
    <circle cx="120" cy="155" r="8" fill="none" stroke="#C77DFF" stroke-width="2" opacity="0.9"/>
    <line x1="120" y1="163" x2="120" y2="178" stroke="#C77DFF" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Binary code particles (decorative) -->
  <g font-family="Courier New, monospace" font-size="9" fill="#4a0090" opacity="0.5">
    <text x="1050" y="40">01001001</text>
    <text x="1150" y="25">10110010</text>
    <text x="1250" y="370">11001010</text>
    <text x="1050" y="385">01010110</text>
    <text x="50" y="15">10100101</text>
    <text x="150" y="385">01101001</text>
    <text x="50" y="385">11010010</text>
  </g>

  <!-- Code brackets decoration (top right) -->
  <g font-family="Courier New, monospace" font-size="28" fill="#7B2FBE" opacity="0.5" filter="url(#glow)">
    <text x="1455" y="35">{</text>
    <text x="1455" y="395">}</text>
  </g>

  <!-- Main title text: AYANTIKA JANA -->
  <text x="80" y="195" 
        font-family="'Segoe UI', 'Arial Black', sans-serif" 
        font-size="72" 
        font-weight="900" 
        fill="#FFFFFF" 
        letter-spacing="4"
        filter="url(#purpleGlow)">AYANTIKA JANA</text>

  <!-- Purple glow duplicate for depth effect -->
  <text x="80" y="195" 
        font-family="'Segoe UI', 'Arial Black', sans-serif" 
        font-size="72" 
        font-weight="900" 
        fill="#9D4EDD"
        letter-spacing="4"
        opacity="0.25"
        filter="url(#strongGlow)">AYANTIKA JANA</text>

  <!-- Divider line under title -->
  <rect x="80" y="208" width="500" height="2" fill="#9D4EDD" opacity="0.8" filter="url(#glow)"/>
  <rect x="80" y="208" width="200" height="2" fill="#C77DFF" opacity="1"/>

  <!-- Subtitle text -->
  <text x="80" y="250" 
        font-family="'Segoe UI', Arial, sans-serif" 
        font-size="17" 
        font-weight="400" 
        fill="#C77DFF" 
        letter-spacing="2"
        opacity="0.9">Cybersecurity  •  Full Stack Development  •  AI  •  Blockchain</text>

  <!-- Tagline -->
  <text x="80" y="300" 
        font-family="'Segoe UI', 'Courier New', monospace" 
        font-size="13" 
        fill="#7B2FBE" 
        letter-spacing="1"
        opacity="0.8">// Building Secure Digital Futures</text>

  <!-- Decorative dot pattern bottom-left -->
  <g fill="#3a0080" opacity="0.6">
    <circle cx="80" cy="340" r="2"/>
    <circle cx="92" cy="340" r="2"/>
    <circle cx="104" cy="340" r="2"/>
    <circle cx="116" cy="340" r="2"/>
    <circle cx="128" cy="340" r="2"/>
    <circle cx="80" cy="352" r="2"/>
    <circle cx="92" cy="352" r="2"/>
    <circle cx="104" cy="352" r="2"/>
    <circle cx="116" cy="352" r="2"/>
    <circle cx="128" cy="352" r="2"/>
    <circle cx="80" cy="364" r="2"/>
    <circle cx="92" cy="364" r="2"/>
    <circle cx="104" cy="364" r="2"/>
    <circle cx="116" cy="364" r="2"/>
    <circle cx="128" cy="364" r="2"/>
  </g>

  <!-- Scan-line overlay for retro cyber feel -->
  <rect width="1500" height="400" fill="url(#scanlines)" opacity="0.03"/>
</svg>
